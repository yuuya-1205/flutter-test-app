name: CI

on:
  # public リポジトリでは GitHub Actions が無料・無制限のため、パスで絞らず
  # すべての PR / push で CI を実行する（設定をシンプルに保ち、安全側に倒す）。
  pull_request:
  push:
    branches: [main]

jobs:
  analyze-and-test:
    name: Analyze & Test (coverage 100%)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Enforce 100% coverage
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: coverage/lcov.info
          min_coverage: 100
          # アプリ起動のみで単体テスト不能な main() を含むブートストラップは除外する。
          exclude: "lib/main.dart"

      # 情報表示のみ（ビルド合否には影響しない）。実行ページのサマリに掲示する。
      - name: Metrics summary (cloc / tests)
        if: always()
        run: |
          sudo apt-get update && sudo apt-get install -y cloc
          test_count=$(grep -rhE "^[[:space:]]*(test|testWidgets|blocTest)[(<]" test --include='*.dart' | wc -l | tr -d ' ')
          assert_count=$(grep -rhoE "\bexpect\(" test --include='*.dart' | wc -l | tr -d ' ')
          {
            echo "## メトリクス"
            echo ""
            echo "- テスト件数（ソース上の登録数）: ${test_count}"
            echo "- アサーション数 (expect): ${assert_count}"
            echo ""
            echo "### cloc (lib / test)"
            echo '```'
            cloc lib test --quiet
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
